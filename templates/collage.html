<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>小红书封面 - 拼贴风</title>
</head>
<body style="margin: 0; padding: 0; width: 1080px; height: 1440px; background: #FFF5F5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; box-sizing: border-box; position: relative; overflow: hidden;">
  
  <!-- 背景装饰 -->
  <div style="position: absolute; top: 50px; left: 50px; width: 200px; height: 200px; background: #FFE4E1; transform: rotate(15deg); border-radius: 20px;"></div>
  <div style="position: absolute; bottom: 100px; right: 80px; width: 150px; height: 150px; background: #FFD1DC; transform: rotate(-10deg); border-radius: 50%;"></div>
  <div style="position: absolute; top: 200px; right: 100px; width: 180px; height: 180px; background: #FFC0CB; transform: rotate(25deg); border-radius: 30px;"></div>
  
  <!-- 主标题区域 -->
  <div style="position: absolute; top: 180px; left: 60px; right: 60px; background: #FFF; padding: 60px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); transform: rotate(-2deg);">
    <h1 style="margin: 0; padding: 0; font-size: 64px; font-weight: 800; color: #333; line-height: 1.3; letter-spacing: 2px;">
      {{TITLE}}
    </h1>
  </div>
  
  <!-- 分类标签 -->
  <div style="position: absolute; top: 450px; right: 80px; background: #FF69B4; padding: 16px 32px; border-radius: 50px; transform: rotate(5deg);">
    <span style="font-size: 28px; color: #FFF; letter-spacing: 2px; font-weight: 600;">{{CATEGORY}}</span>
  </div>
  
  <!-- 副标题 -->
  <div style="position: absolute; top: 550px; left: 80px; right: 80px;">
    <p style="margin: 0; padding: 0; font-size: 36px; color: #666; line-height: 1.6; font-weight: 400;">
      {{SUBTITLE}}
    </p>
  </div>
  
  <!-- 装饰元素 -->
  <div style="position: absolute; bottom: 300px; left: 80px; display: flex; gap: 20px;">
    <div style="width: 80px; height: 80px; background: #FFB6C1; border-radius: 50%; opacity: 0.8;"></div>
    <div style="width: 60px; height: 60px; background: #FF69B4; border-radius: 50%; opacity: 0.6; margin-top: 10px;"></div>
    <div style="width: 40px; height: 40px; background: #FF1493; border-radius: 50%; opacity: 0.4; margin-top: 20px;"></div>
  </div>
  
  <!-- 底部装饰 -->
  <div style="position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px;">
    <div style="width: 12px; height: 12px; background: #FFB6C1; border-radius: 50%;"></div>
    <div style="width: 12px; height: 12px; background: #FF69B4; border-radius: 50%;"></div>
    <div style="width: 12px; height: 12px; background: #FF1493; border-radius: 50%;"></div>
    <div style="width: 12px; height: 12px; background: #FF69B4; border-radius: 50%;"></div>
    <div style="width: 12px; height: 12px; background: #FFB6C1; border-radius: 50%;"></div>
  </div>
  
  <!-- 底部标识 -->
  <div style="position: absolute; bottom: 40px; right: 80px;">
    <span style="font-size: 24px; color: #CCC; letter-spacing: 1px;">小红书</span>
  </div>
  
</body>
</html>

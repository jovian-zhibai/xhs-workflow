<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>小红书封面 - 简约白</title>
</head>
<body style="margin: 0; padding: 0; width: 1080px; height: 1440px; background: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box;">
  
  <!-- 分类标签 -->
  <div style="position: absolute; top: 80px; left: 80px; background: #F5F5F5; padding: 12px 24px; border-radius: 8px;">
    <span style="font-size: 28px; color: #999; letter-spacing: 2px;">{{CATEGORY}}</span>
  </div>
  
  <!-- 主标题区域 -->
  <div style="width: 920px; text-align: left; padding: 0 80px;">
    <h1 style="margin: 0; padding: 0; font-size: 72px; font-weight: 700; color: #333; line-height: 1.3; letter-spacing: 2px;">
      {{TITLE}}
    </h1>
  </div>
  
  <!-- 副标题 -->
  <div style="width: 920px; text-align: left; padding: 30px 80px 0;">
    <p style="margin: 0; padding: 0; font-size: 36px; color: #666; line-height: 1.5;">
      {{SUBTITLE}}
    </p>
  </div>
  
  <!-- 装饰线 -->
  <div style="position: absolute; bottom: 200px; left: 80px; width: 120px; height: 4px; background: #333;"></div>
  
  <!-- 底部标识 -->
  <div style="position: absolute; bottom: 80px; right: 80px;">
    <span style="font-size: 24px; color: #CCC; letter-spacing: 1px;">小红书</span>
  </div>
  
</body>
</html>

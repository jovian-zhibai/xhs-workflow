<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>小红书封面 - 清单风</title>
</head>
<body style="margin: 0; padding: 0; width: 1080px; height: 1440px; background: #F8F9FA; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; box-sizing: border-box; position: relative; overflow: hidden;">
  
  <!-- 顶部色块 -->
  <div style="position: absolute; top: 0; left: 0; right: 0; height: 400px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
  
  <!-- 分类标签 -->
  <div style="position: absolute; top: 80px; left: 80px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 16px 32px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.3);">
    <span style="font-size: 28px; color: #FFF; letter-spacing: 3px; font-weight: 500;">{{CATEGORY}}</span>
  </div>
  
  <!-- 主标题区域 -->
  <div style="position: absolute; top: 150px; left: 80px; right: 80px;">
    <h1 style="margin: 0; padding: 0; font-size: 72px; font-weight: 800; color: #FFF; line-height: 1.3; letter-spacing: 2px; text-shadow: 0 4px 20px rgba(0,0,0,0.2);">
      {{TITLE}}
    </h1>
  </div>
  
  <!-- 列表区域 -->
  <div style="position: absolute; top: 420px; left: 80px; right: 80px;">
    <!-- 列表项 1 -->
    <div style="display: flex; align-items: center; margin-bottom: 40px; background: #FFF; padding: 30px 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
      <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 30px; flex-shrink: 0;">
        <span style="font-size: 28px; color: #FFF; font-weight: 700;">1</span>
      </div>
      <span style="font-size: 36px; color: #333; font-weight: 600; line-height: 1.4;">{{ITEM_1}}</span>
    </div>
    
    <!-- 列表项 2 -->
    <div style="display: flex; align-items: center; margin-bottom: 40px; background: #FFF; padding: 30px 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
      <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 30px; flex-shrink: 0;">
        <span style="font-size: 28px; color: #FFF; font-weight: 700;">2</span>
      </div>
      <span style="font-size: 36px; color: #333; font-weight: 600; line-height: 1.4;">{{ITEM_2}}</span>
    </div>
    
    <!-- 列表项 3 -->
    <div style="display: flex; align-items: center; margin-bottom: 40px; background: #FFF; padding: 30px 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
      <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 30px; flex-shrink: 0;">
        <span style="font-size: 28px; color: #FFF; font-weight: 700;">3</span>
      </div>
      <span style="font-size: 36px; color: #333; font-weight: 600; line-height: 1.4;">{{ITEM_3}}</span>
    </div>
    
    <!-- 列表项 4 -->
    <div style="display: flex; align-items: center; margin-bottom: 40px; background: #FFF; padding: 30px 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
      <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 30px; flex-shrink: 0;">
        <span style="font-size: 28px; color: #FFF; font-weight: 700;">4</span>
      </div>
      <span style="font-size: 36px; color: #333; font-weight: 600; line-height: 1.4;">{{ITEM_4}}</span>
    </div>
    
    <!-- 列表项 5 -->
    <div style="display: flex; align-items: center; background: #FFF; padding: 30px 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
      <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 30px; flex-shrink: 0;">
        <span style="font-size: 28px; color: #FFF; font-weight: 700;">5</span>
      </div>
      <span style="font-size: 36px; color: #333; font-weight: 600; line-height: 1.4;">{{ITEM_5}}</span>
    </div>
  </div>
  
  <!-- 底部标识 -->
  <div style="position: absolute; bottom: 60px; right: 80px;">
    <span style="font-size: 24px; color: #CCC; letter-spacing: 1px;">小红书</span>
  </div>
  
</body>
</html>
